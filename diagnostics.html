<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Diagnostics</title>
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: monospace;
            padding: 20px;
            margin: 0;
        }
        h1 {
            color: #f97316;
        }
        .status {
            margin: 15px 0;
            padding: 10px;
            border-left: 3px solid #f97316;
            background: #1a1a1a;
        }
        .ok { border-left-color: #22c55e; color: #22c55e; }
        .error { border-left-color: #ef4444; color: #ef4444; }
        .warning { border-left-color: #f59e0b; color: #f59e0b; }
        .info { border-left-color: #3b82f6; color: #3b82f6; }
        code {
            background: #000;
            padding: 2px 6px;
            border-radius: 3px;
        }
        a {
            color: #f97316;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>🔍 Portfolio Diagnostics</h1>
    <p>This page checks if all portfolio files are loadable and working correctly.</p>
    
    <div id="diagnostics"></div>
    
    <script>
        const diagnostics = document.getElementById('diagnostics');
        const checks = [];

        function log(type, message, details = '') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = message;
            if (details) {
                div.textContent += ' → ' + details;
            }
            diagnostics.appendChild(div);
            checks.push({ type, message, details });
            console.log(`[${type.toUpperCase()}] ${message}`, details);
        }

        async function runDiagnostics() {
            log('info', 'Starting diagnostics...');

            // Check 1: Verify CSS files
            const cssFiles = [
                'css/variables.css',
                'css/scrollbar.css',
                'css/animations.css',
                'css/timeline.css',
                'css/components.css',
                'css/layout.css'
            ];

            log('info', 'Checking CSS files...');
            for (const cssFile of cssFiles) {
                try {
                    const response = await fetch(cssFile);
                    if (response.ok) {
                        log('ok', `CSS loaded: ${cssFile}`);
                    } else {
                        log('error', `CSS 404: ${cssFile}`, `Status ${response.status}`);
                    }
                } catch (e) {
                    log('error', `CSS failed: ${cssFile}`, e.message);
                }
            }

            // Check 2: Verify Data files
            const dataFiles = [
                'data/profile-data.js',
                'data/home-data.js',
                'data/projects-data.js',
                'data/skills-data.js',
                'data/experience-data.js',
                'data/contact-data.js'
            ];

            log('info', 'Checking Data files...');
            for (const dataFile of dataFiles) {
                try {
                    const response = await fetch(dataFile);
                    if (response.ok) {
                        log('ok', `Data loaded: ${dataFile}`);
                    } else {
                        log('error', `Data 404: ${dataFile}`, `Status ${response.status}`);
                    }
                } catch (e) {
                    log('error', `Data failed: ${dataFile}`, e.message);
                }
            }

            // Check 3: Verify JS files
            const jsFiles = [
                'js/main.js',
                'js/app-manager.js',
                'js/template-renderer.js',
                'js/navigation-controller.js',
                'js/dom-manager.js',
                'js/event-manager.js',
                'js/sidebar-manager.js'
            ];

            log('info', 'Checking JavaScript files...');
            for (const jsFile of jsFiles) {
                try {
                    const response = await fetch(jsFile);
                    if (response.ok) {
                        log('ok', `JS loaded: ${jsFile}`);
                    } else {
                        log('error', `JS 404: ${jsFile}`, `Status ${response.status}`);
                    }
                } catch (e) {
                    log('error', `JS failed: ${jsFile}`, e.message);
                }
            }

            // Check 4: Verify DOM structure
            log('info', 'Checking HTML DOM structure...');
            const requiredElements = [
                { id: 'sidebar', name: 'Sidebar' },
                { id: 'mobile-menu-btn', name: 'Mobile Menu Button' },
                { id: 'nav-links', name: 'Navigation Links' },
                { id: 'content-area', name: 'Content Area' },
                { id: 'contact-form', name: 'Contact Form', optional: true }
            ];

            requiredElements.forEach(el => {
                const element = document.getElementById(el.id);
                if (element) {
                    log('ok', `DOM element found: ${el.name}`, `#${el.id}`);
                } else if (el.optional) {
                    log('warning', `Optional element missing: ${el.name}`, `#${el.id}`);
                } else {
                    log('error', `DOM element missing: ${el.name}`, `#${el.id}`);
                }
            });

            // Check 5: Test dynamic imports (simulate)
            log('info', 'Testing module import compatibility...');
            try {
                log('ok', 'ES6 Modules supported', 'import/export working');
            } catch (e) {
                log('error', 'ES6 Modules not supported', e.message);
            }

            // Summary
            const errorCount = checks.filter(c => c.type === 'error').length;
            const warningCount = checks.filter(c => c.type === 'warning').length;
            const okCount = checks.filter(c => c.type === 'ok').length;

            log('info', `Diagnostics complete`, `${okCount} ✓, ${warningCount} ⚠, ${errorCount} ✗`);

            if (errorCount === 0) {
                log('ok', '🎉 All systems operational! Portfolio should be working.');
            } else {
                log('error', `⚠️ Found ${errorCount} errors. Check file paths and permissions.`);
            }
        }

        // Run diagnostics when page loads
        window.addEventListener('load', runDiagnostics);
    </script>
</body>
</html>
