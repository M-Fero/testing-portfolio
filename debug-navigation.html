<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Navigation Debug</title>
    <style>
        body {
            font-family: monospace;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .panel {
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
        }
        h2 {
            color: #f97316;
            margin-top: 0;
            border-bottom: 2px solid #f97316;
            padding-bottom: 10px;
        }
        .log-area {
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 10px;
            height: 400px;
            overflow-y: auto;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .button {
            background: #f97316;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        .button:hover {
            background: #ea580c;
        }
        .test-result {
            padding: 8px;
            margin: 5px 0;
            border-left: 3px solid #ccc;
        }
        .test-pass {
            background: #1a3a1a;
            border-left-color: #28a745;
            color: #86efac;
        }
        .test-fail {
            background: #3a1a1a;
            border-left-color: #dc3545;
            color: #fca5a5;
        }
        .iframe-container {
            grid-column: 1 / -1;
            height: 600px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 1px solid #333;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1 style="color: #f97316; margin-bottom: 30px;">🧪 Portfolio Navigation Debug</h1>

    <div class="container">
        <div class="panel">
            <h2>📊 Test Results</h2>
            <div id="results" class="log-area"></div>
        </div>

        <div class="panel">
            <h2>🎮 Manual Tests</h2>
            <button class="button" onclick="runTests()">Run All Tests</button>
            <button class="button" onclick="testNav('home')">Go Home</button>
            <button class="button" onclick="testNav('projects')">Go Projects</button>
            <button class="button" onclick="testNav('skills')">Go Skills</button>
            <button class="button" onclick="testNav('experience')">Go Experience</button>
            <button class="button" onclick="testNav('contact')">Go Contact</button>
            
            <h3 style="margin-top: 20px; color: #f97316;">📝 Console Log</h3>
            <div id="console-log" class="log-area"></div>
        </div>

        <div class="iframe-container">
            <h2 style="margin: 0 0 10px 0;">📱 Portfolio Preview</h2>
            <iframe id="portfolio" src="index.html"></iframe>
        </div>
    </div>

    <script>
        const resultsDiv = document.getElementById('results');
        const consoleDiv = document.getElementById('console-log');
        let portfolioApp = null;
        let iframeWindow = null;

        // Capture console logs
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        function addConsoleLog(type, ...args) {
            const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
            const time = new Date().toLocaleTimeString();
            const typeStr = type === 'log' ? '📝' : type === 'error' ? '❌' : '⚠️ ';
            const logLine = `[${time}] ${typeStr} ${msg}\n`;
            consoleDiv.textContent += logLine;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            
            // Also call original
            if (type === 'log') originalLog(...args);
            else if (type === 'error') originalError(...args);
            else originalWarn(...args);
        }

        console.log = (...args) => addConsoleLog('log', ...args);
        console.error = (...args) => addConsoleLog('error', ...args);
        console.warn = (...args) => addConsoleLog('warn', ...args);

        function addResult(title, passed, details = '') {
            const resultDiv = document.createElement('div');
            resultDiv.className = `test-result ${passed ? 'test-pass' : 'test-fail'}`;
            resultDiv.textContent = `${passed ? '✅' : '❌'} ${title}${details ? '\n' + details : ''}`;
            resultsDiv.appendChild(resultDiv);
            return passed;
        }

        function runTests() {
            resultsDiv.textContent = '';
            console.log('🧪 Starting comprehensive navigation tests...\n');

            let passed = 0;
            let failed = 0;

            try {
                // Get iframe reference
                const iframe = document.getElementById('portfolio');
                iframeWindow = iframe.contentWindow;
                portfolioApp = iframeWindow.portfolioApp;

                // Test 1: App exists
                if (addResult('App Instance', !!portfolioApp)) passed++;
                else failed++;

                // Test 2: App methods
                if (portfolioApp) {
                    if (addResult('getCurrentPage() method', typeof portfolioApp.getCurrentPage === 'function')) passed++;
                    else failed++;

                    if (addResult('navigateTo()  method', typeof portfolioApp.navigateTo === 'function')) passed++;
                    else failed++;
                }

                // Test 3: DOM elements
                const doc = iframe.contentDocument;
                
                if (addResult('Sidebar element', !!doc.getElementById('sidebar'))) passed++;
                else failed++;

                if (addResult('Content area element', !!doc.getElementById('content-area'))) passed++;
                else failed++;

                // Test 4: Navigation links
                const navLinks = doc.querySelectorAll('.nav-link');
                if (addResult('Navigation links', navLinks.length === 5, `Found ${navLinks.length}/5`)) passed++;
                else failed++;

                // Test 5: Profile rendered
                const profileName = doc.querySelector('.profile-section h2');
                if (addResult('Profile rendered', !!profileName && profileName.textContent.length > 0, profileName?.textContent)) passed++;
                else failed++;

                // Test 6: Home page content
                const contentArea = doc.getElementById('content-area');
                if (addResult('Content loaded', contentArea && contentArea.innerHTML.length > 100, `${contentArea?.innerHTML.length || 0} chars`)) passed++;
                else failed++;

                // Test 7: Navigation click
                if (navLinks.length > 0) {
                    const initialPage = portfolioApp.getCurrentPage();
                    const clickPage = navLinks[1].getAttribute('data-page');
                    
                    console.log(`\nSimulating click on nav link for "${clickPage}"`);
                    navLinks[1].click();
                    
                    setTimeout(() => {
                        const newPage = portfolioApp.getCurrentPage();
                        if (addResult('Navigation works', newPage === clickPage, `${initialPage} → ${newPage}`)) passed++;
                        else failed++;

                        // Summary
                        const summary = document.createElement('div');
                        summary.style.marginTop = '20px';
                        summary.style.padding = '10px';
                        summary.style.background = '#1a3a1a';
                        summary.style.border = '2px solid #28a745';
                        summary.style.borderRadius = '4px';
                        summary.style.fontWeight = 'bold';
                        summary.style.color = '#86efac';
                        summary.textContent = `✅ SUMMARY: ${passed} passed, ${failed} failed`;
                        resultsDiv.appendChild(summary);
                        
                        console.log(`\n✅ Test complete: ${passed} passed, ${failed} failed`);
                    }, 300);
                }

            } catch (error) {
                addResult('Test execution', false, error.message);
                console.error('Test error:', error);
            }
        }

        function testNav(page) {
            try {
                const iframe = document.getElementById('portfolio');
                const app = iframe.contentWindow.portfolioApp;
                
                if (app) {
                    console.log(`\n🎮 Manual test: Navigating to "${page}"`);
                    app.navigateTo(page);
                    console.log(`✅ Navigated to "${page}"`);
                } else {
                    console.error('❌ App not ready');
                }
            } catch (error) {
                console.error('Navigation error:', error);
            }
        }

        // Auto-run tests after iframe loads
        const iframe = document.getElementById('portfolio');
        iframe.onload = () => {
            console.log('📱 Iframe loaded, waiting 2 seconds for app initialization...');
            setTimeout(runTests, 2000);
        };
    </script>
</body>
</html>
