        @keyframes fadeIn {

            to { opacity: 1; transform: translateY(0); }

        .timeline-container { border-left: 2px solid #333; padding-left: 2rem; margin-left: 1rem; }
        .timeline-item { position: relative; padding-bottom: 3rem; }
        .timeline-item:last-child { padding-bottom: 0; }

        function showFieldError(field, message) {
            field.classList.add('border-red-500', 'ring-1', 'ring-red-500');
            field.classList.remove('border-[#333]', 'focus:border-orange-500', 'focus:ring-orange-500');
            const existing = field.nextElementSibling;
            if (existing && existing.classList.contains('field-error')) existing.remove();
            const err = document.createElement('p');
            err.className = 'field-error text-red-400 text-xs mt-1.5 flex items-center gap-1';
            err.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + message;
            field.insertAdjacentElement('afterend', err);
        }

        function clearFieldError(field) {
            field.classList.remove('border-red-500', 'ring-1', 'ring-red-500');
            field.classList.add('border-[#333]');
            const next = field.nextElementSibling;
            if (next && next.classList.contains('field-error')) next.remove();
        }

        function sendContactEmail(e) {
            e.preventDefault();
            const form      = e.target;
            const nameField  = form.querySelector('[name="from_name"]');
            const emailField = form.querySelector('[name="from_email"]');
            const msgField   = form.querySelector('[name="message"]');

            // Clear previous errors
            [nameField, emailField, msgField].forEach(clearFieldError);

            // Validate
            let valid = true;
            if (!nameField.value.trim()) {
                showFieldError(nameField, 'Name is required.');
                valid = false;
            }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailField.value.trim()) {
                showFieldError(emailField, 'Email is required.');
                valid = false;
            } else if (!emailRegex.test(emailField.value.trim())) {
                showFieldError(emailField, 'Please enter a valid email address.');
                valid = false;
            }
            if (!msgField.value.trim()) {
                showFieldError(msgField, 'Message cannot be empty.');
                valid = false;
            }
            if (!valid) return;

            const btn = document.getElementById('submit-btn');
            const originalHTML = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Sending...';
            btn.classList.replace('bg-orange-600', 'bg-gray-600');

            fetch('https://formsubmit.co/ajax/Mostafa.f.fero@gmail.com', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({
                    name:    nameField.value,
                    email:   emailField.value,
                    message: msgField.value
                })
            })
            .then(res => res.json())
            .then(() => {
                btn.innerHTML = '<i class="fas fa-check mr-2"></i> Message Sent!';
                btn.classList.replace('bg-gray-600', 'bg-green-600');
                form.reset();
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = originalHTML;
                    btn.classList.replace('bg-green-600', 'bg-orange-600');
                }, 4000);
            })
            .catch(() => {
                btn.innerHTML = '<i class="fas fa-times mr-2"></i> Failed. Try Again.';
                btn.classList.replace('bg-gray-600', 'bg-red-600');
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = originalHTML;
                    btn.classList.replace('bg-red-600', 'bg-orange-600');
                }, 4000);
            });
        }

        // DOM Elements
        const contentArea = document.getElementById('content-area');
        const navLinks = document.querySelectorAll('.nav-link');
        const sidebar = document.getElementById('sidebar');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');

        // Navigation Logic
        function loadPage(pageName) {
            // Update content
            contentArea.innerHTML = pages[pageName] || '<h2 class="text-2xl text-white">Page not found</h2>';

            // Scroll to top on page change
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // Update active state on nav links
            navLinks.forEach(link => {
                // Reset classes
                link.classList.remove('bg-orange-600', 'text-white', 'shadow-[0_0_15px_rgba(249,115,22,0.4)]', 'text-orange-500', 'bg-[#1a1a1a]');
                link.classList.add('text-gray-400', 'hover:bg-[#1a1a1a]', 'hover:text-orange-500');

                // Set active class
                if (link.getAttribute('data-page') === pageName) {
                    link.classList.remove('text-gray-400', 'hover:bg-[#1a1a1a]', 'hover:text-orange-500');
                    link.classList.add('bg-orange-600', 'text-white', 'shadow-[0_0_15px_rgba(249,115,22,0.4)]');
                }
            });

            // On mobile, close sidebar after clicking
            if (window.innerWidth < 768 && !sidebar.classList.contains('hidden')) {
                sidebar.classList.add('hidden');
            }
        }

        // Event Listeners
        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const page = e.currentTarget.getAttribute('data-page');
                loadPage(page);
            });
        });

        // Mobile Menu Toggle
        mobileMenuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('hidden');
        });

        // Load default page
        loadPage('home');
    </script>
