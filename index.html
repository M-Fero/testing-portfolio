<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mostafa Fero | Game Developer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Custom CSS Stylesheets -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/scrollbar.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/timeline.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: {
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#ea580c',
                            900: '#7c2d12',
                        },
                        dark: {
                            bg: '#000000',
                            surface: '#111111',
                            border: '#222222',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-bg text-gray-300 font-sans antialiased flex flex-col md:flex-row min-h-screen selection:bg-orange-500 selection:text-white">

    <!-- Mobile Header -->
    <header class="md:hidden bg-dark-surface border-b border-dark-border p-4 flex justify-between items-center sticky top-0 z-50 shadow-md">
        <div>
            <h1 class="text-xl font-bold text-white">Mostafa Fero</h1>
            <p class="text-xs text-orange-500 font-medium">Unity Game Developer</p>
        </div>
        <button id="mobile-menu-btn" class="text-gray-300 hover:text-orange-500 transition-colors focus:outline-none active:scale-90 transform duration-200">
            <i class="fas fa-bars text-2xl"></i>
        </button>
    </header>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="bg-dark-surface border-r border-dark-border w-full md:w-72 md:flex flex-col hidden md:sticky md:top-0 md:h-screen shadow-2xl z-40 md:z-0 transition-all duration-300">
        <div class="p-8 flex-grow overflow-y-auto">
            <!-- Profile Section -->
            <div class="text-center mb-8 hidden md:block group cursor-pointer profile-section">
                <div class="profile-avatar"></div>
                <h2 class="text-2xl font-bold text-white"></h2>
                <p class="text-orange-500 mt-1 font-medium tracking-wide"></p>
            </div>

            <!-- Navigation Links -->
            <nav>
                <ul id="nav-links" class="space-y-3">
                    <!-- Generated by JavaScript -->
                </ul>
            </nav>

            <!-- Download CV Button -->
            <a href="Mostafa-Fero-Unity-Developer.pdf" target="_blank" class="mt-8 hidden md:flex items-center justify-center w-full bg-transparent border border-orange-500 text-orange-500 font-bold py-3 px-4 rounded-lg transition-all hover:bg-orange-500 hover:text-white hover:shadow-[0_0_15px_rgba(249,115,22,0.4)] active:scale-95">
                <i class="fas fa-download mr-2"></i> Download CV
            </a>
        </div>

        <!-- Social Links -->
        <div class="p-8 bg-black bg-opacity-50 flex justify-center space-x-6 border-t border-dark-border social-links">
            <!-- Generated by JavaScript -->
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 p-6 md:p-12 overflow-y-auto relative">
        <!-- Subtle background glow -->
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-orange-600/10 rounded-full blur-[120px] -z-10 pointer-events-none bg-glow"></div>

        <!-- Content Container -->
        <div id="content-area" class="max-w-4xl mx-auto z-10">
            <!-- Dynamic content injected here by JavaScript -->
        </div>
    </main>

    <!-- Application Scripts - Module Imports -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
